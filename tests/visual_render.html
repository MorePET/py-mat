<!DOCTYPE html>
<html>
<head>
<style>body{margin:0;overflow:hidden;background:#222}canvas{display:block}</style>
</head>
<body>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, 800/600, 0.1, 1000);
camera.position.set(20, 15, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({antialias: true, preserveDrawingBuffer: true});
renderer.setSize(800, 600);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(10, 20, 10);
scene.add(dir);
const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
dir2.position.set(-10, 5, -10);
scene.add(dir2);

// Environment for PBR reflections
const envTexture = new THREE.CubeTextureLoader().load([
  'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12P4/x8AAwAB/aurH8kAAAAASUVORK5CYII=',
  'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12P4/x8AAwAB/aurH8kAAAAASUVORK5CYII=',
  'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12P4/x8AAwAB/aurH8kAAAAASUVORK5CYII=',
  'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12P4/x8AAwAB/aurH8kAAAAASUVORK5CYII=',
  'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12P4/x8AAwAB/aurH8kAAAAASUVORK5CYII=',
  'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12P4/x8AAwAB/aurH8kAAAAASUVORK5CYII=',
]);
scene.environment = envTexture;

// Load glTF from query param or default
const params = new URLSearchParams(window.location.search);
const gltfUrl = params.get('gltf') || 'model.glb';

const loader = new GLTFLoader();
// Grid floor
const grid = new THREE.GridHelper(50, 10, 0x444466, 0x333355);
scene.add(grid);

loader.load(gltfUrl, (gltf) => {
  // build123d exports in meters — scale to mm for visibility
  gltf.scene.scale.set(1000, 1000, 1000);
  scene.add(gltf.scene);

  // Auto-fit camera to model
  const box = new THREE.Box3().setFromObject(gltf.scene);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3()).length();
  const dist = size * 2.5;
  camera.position.set(center.x + dist*0.7, center.y + dist*0.5, center.z + dist*0.7);
  camera.lookAt(center);
  camera.updateProjectionMatrix();

  // Debug info
  const meshes = [];
  gltf.scene.traverse((child) => {
    if (child.isMesh) meshes.push({
      name: child.name,
      pos: child.position.toArray(),
      geo: child.geometry ? child.geometry.attributes.position?.count : 0,
      mat: child.material ? child.material.type : 'none',
    });
  });
  window.__debugInfo = {meshes, center: center.toArray(), size, camPos: camera.position.toArray()};
  console.log('DEBUG:', JSON.stringify(window.__debugInfo));

  // Multiple render passes for PBR convergence
  for (let i = 0; i < 3; i++) {
    renderer.render(scene, camera);
  }
  window.__renderComplete = true;
}, undefined, (err) => {
  console.error('glTF load error:', err);
  window.__renderComplete = true;
});
</script>
</body>
</html>
