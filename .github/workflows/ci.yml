# CI Workflow
#
# Runs automated code quality checks and tests on pull requests.
# Default template for Python projects using the vigOS devcontainer.
#
# Jobs:
#   1. lint              — Pre-commit hooks (Ruff, yamllint, pymarkdown, shellcheck, etc.)
#   2. test              — Pytest with coverage
#   3. security          — Python security scanning (Bandit)
#   4. dependency-review — Dependency vulnerability check (PRs only)
#   5. summary           — Aggregate results for branch protection
#
# Triggers:
#   - Pull requests to dev, release/**, and main (runs all checks)
#   - Manual workflow_dispatch (select specific suite to run)
#

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lint
          - test
          - security

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'lint'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test-matrix:
    # Matrix of (python-version, extras set). Each cell is a visible
    # status check. The roll-up `test` job below aggregates them into
    # the single `Tests` context consumers of the ruleset depend on.
    name: "Tests (${{ matrix.label }})"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'test'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported Python. `tomllib` is shimmed via
          # `tomli` on 3.10 (see src/pymat/loader.py + the env
          # marker in pyproject.toml).
          - label: "py3.10, all"
            python-version: "3.10"
            uv-sync-args: "--all-extras"
          - label: "py3.11, all"
            python-version: "3.11"
            uv-sync-args: "--all-extras"
          # Full integration. On 3.12, `--all-extras` installs
          # periodictable, matproj, build123d, and dev (pytest). On
          # 3.13+, the env marker on build123d drops it silently,
          # which is exactly what we want for forward-compat testing.
          - label: "py3.12, all"
            python-version: "3.12"
            uv-sync-args: "--all-extras"
          - label: "py3.13, all"
            python-version: "3.13"
            uv-sync-args: "--all-extras"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}
          sync-dependencies: 'true'
          uv-sync-args: ${{ matrix.uv-sync-args }}

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 30
          if-no-files-found: ignore

  test:
    # Roll-up status check. Keeps `Tests` stable as a required-status
    # context in branch rulesets while individual matrix cells report
    # under `Tests (py3.12, all)` / `Tests (py3.13, core)`.
    name: Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    needs: [test-matrix]
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "::error::One or more test-matrix cells failed"
            exit 1
          fi
          echo "All test-matrix cells passed"

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'security'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Install safety
        run: uv pip install safety==3.7.0

      - name: Run Bandit (Python security linting)
        id: bandit
        run: |
          uv run bandit -r src/ -ll -f json -o bandit-report.json || true
          echo "Bandit scan completed"

      - name: Run Safety (dependency vulnerability check)
        id: safety
        run: |
          safety check --json > safety-report.json || true
          echo "Safety scan completed"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Report Bandit findings
        if: always() && steps.bandit.outcome == 'success'
        run: |
          if [ -f bandit-report.json ]; then
            echo "## Security: Bandit" >> $GITHUB_STEP_SUMMARY
            python -m json.tool bandit-report.json | head -50 >> $GITHUB_STEP_SUMMARY || true
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Review dependencies for vulnerabilities
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high

  pr-hygiene:
    # Enforces the PR template checklist. Any unchecked `- [ ]` left in the
    # PR body fails the build. The template is designed for the user to
    # DELETE sections that don't apply (see .github/pull_request_template.md);
    # leaving them unchecked is treated as "you forgot", not "N/A".
    #
    # Skipped for release-please bot PRs because the bot owns the body and the
    # release-reviewer checklist embedded there is for human reviewers, not for
    # CI to gate (the gate is the human merging the PR).
    name: PR Hygiene
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      !startsWith(github.head_ref, 'release-please--')

    steps:
      - name: Require checklist items
        uses: mheap/require-checklist-action@46d2ca1a0f90144bd081fd13a80b1dc581759365  # v2.5.0
        with:
          requireChecklist: true

  rust:
    name: Rust (mat-rs)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mat-rs

      - name: Check formatting
        run: cargo fmt --manifest-path mat-rs/Cargo.toml --all -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path mat-rs/Cargo.toml --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path mat-rs/Cargo.toml

  pymat-mcp:
    name: "Tests (pymat-mcp)"
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'test'

    defaults:
      run:
        working-directory: clients/python/pymat-mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install pymat-mcp + py-materials (editable)
        # Editable install of both so any breaking change in the core
        # package fails the MCP test suite in the same PR run, not on
        # tag-time when it's too late.
        run: |
          uv venv .venv --python 3.12
          uv pip install --python .venv/bin/python -e . -e ../../.. pytest pytest-asyncio

      - name: Run tests
        run: .venv/bin/python -m pytest -v

  check-licenses:
    name: Validate _sources licenses
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'lint'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run check_licenses.py
        # Stdlib-only script — no install step needed. Validates every
        # `_sources` entry in src/pymat/data/*.toml has a license in the
        # allow-list. Honors .github/license-ratchet.txt during the #175
        # audit window.
        run: python scripts/check_licenses.py

      - name: Run check_pep_naming.py
        # Stdlib-only AST hook. Flags trailing-`_` on names whose
        # stripped form isn't a Python keyword/built-in — Bernhard's
        # py-mat #218 readability ask. Ruff's N-rules don't cover
        # this specific pattern.
        run: python scripts/check_pep_naming.py

  summary:
    name: CI Summary
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [lint, test, security, dependency-review, pr-hygiene, rust, pymat-mcp, check-licenses]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Results Summary"
          echo "==================="
          echo ""
          echo "Lint:              ${{ needs.lint.result }}"
          echo "Test:              ${{ needs.test.result }}"
          echo "Security:          ${{ needs.security.result }}"
          echo "Dependency Review: ${{ needs.dependency-review.result }}"
          echo "PR Hygiene:        ${{ needs.pr-hygiene.result }}"
          echo "Rust (mat-rs):     ${{ needs.rust.result }}"
          echo "pymat-mcp:         ${{ needs.pymat-mcp.result }}"
          echo "check-licenses:    ${{ needs.check-licenses.result }}"
          echo ""

          FAILED=false

          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "ERROR: Lint checks failed"
            FAILED=true
          fi

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "ERROR: Tests failed"
            FAILED=true
          fi

          if [ "${{ needs.security.result }}" = "failure" ]; then
            echo "ERROR: Security scan failed"
            FAILED=true
          fi

          if [ "${{ needs.dependency-review.result }}" = "failure" ]; then
            echo "ERROR: Dependency review failed"
            FAILED=true
          fi

          if [ "${{ needs.pr-hygiene.result }}" = "failure" ]; then
            echo "ERROR: PR Hygiene failed (unchecked checklist items in PR body)"
            FAILED=true
          fi

          if [ "${{ needs.rust.result }}" = "failure" ]; then
            echo "ERROR: Rust checks failed"
            FAILED=true
          fi

          if [ "${{ needs.pymat-mcp.result }}" = "failure" ]; then
            echo "ERROR: pymat-mcp tests failed"
            FAILED=true
          fi

          if [ "${{ needs.check-licenses.result }}" = "failure" ]; then
            echo "ERROR: License validation failed (see docs/data-policy.md)"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more checks failed"
            exit 1
          fi

          echo ""
          echo "All executed checks passed"
